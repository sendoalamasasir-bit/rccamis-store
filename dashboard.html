<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | RC Camis Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <nav class="bg-slate-900 text-white p-4 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black flex items-center gap-2">
                <span class="material-icons text-primary text-pink-500">admin_panel_settings</span> 
                RC CAMIS <span class="font-light">| DASHBOARD</span>
            </h1>
            <a href="index.html" class="text-sm bg-slate-800 px-4 py-2 rounded-lg hover:bg-slate-700">Ver Tienda</a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-green-500">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-bold text-slate-500 uppercase tracking-wider">Ingresos (PayPal)</p>
                        <h3 class="text-3xl font-black text-slate-900 mt-1" id="stat-revenue">0.00 €</h3>
                    </div>
                    <span class="material-icons text-green-500 bg-green-50 p-2 rounded-lg">payments</span>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-blue-500">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-bold text-slate-500 uppercase tracking-wider">Total Pedidos</p>
                        <h3 class="text-3xl font-black text-slate-900 mt-1" id="stat-orders">0</h3>
                    </div>
                    <span class="material-icons text-blue-500 bg-blue-50 p-2 rounded-lg">shopping_bag</span>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-purple-500">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-bold text-slate-500 uppercase tracking-wider">Mystery Boxes Vendidas</p>
                        <h3 class="text-3xl font-black text-slate-900 mt-1" id="stat-mystery">0</h3>
                    </div>
                    <span class="material-icons text-purple-500 bg-purple-50 p-2 rounded-lg">card_giftcard</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h2 class="text-lg font-bold flex items-center gap-2"><span class="material-icons text-slate-400">receipt_long</span> Últimos Pedidos</h2>
                <button onclick="cargarPedidos()" class="text-sm bg-white border border-slate-300 px-3 py-1 rounded hover:bg-slate-50 flex items-center gap-1">
                    <span class="material-icons text-sm">refresh</span> Actualizar
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white text-xs uppercase text-slate-500 border-b border-slate-200">
                            <th class="p-4 font-bold">Fecha / ID</th>
                            <th class="p-4 font-bold">Estado / Origen</th>
                            <th class="p-4 font-bold">Artículos (Incluye configuración)</th>
                            <th class="p-4 font-bold text-right">Total</th>
                        </tr>
                    </thead>
                    <tbody id="orders-body" class="divide-y divide-slate-100 text-sm">
                        <tr><td colspan="4" class="p-8 text-center text-slate-400"><span class="material-icons animate-spin">refresh</span> Cargando pedidos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // MISMAS CREDENCIALES DE TU TIENDA
        const firebaseConfig = {
            apiKey: "AIzaSyDCxD-IVLjXcQT1LzfLVqy7nPpTZvwEqNnw",
            authDomain: "rccamis-store.firebaseapp.com",
            projectId: "rccamis-store",
            storageBucket: "rccamis-store.appspot.com",
            messagingSenderId: "1036696205279",
            appId: "1:1036696205279:web:4bf61aa2503a41a6c5366a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.cargarPedidos = async function() {
            try {
                const q = query(collection(db, "orders"), orderBy("fecha", "desc"));
                const querySnapshot = await getDocs(q);
                
                let html = '';
                let totalGanado = 0;
                let mysteryBoxes = 0;
                let totalPedidos = 0;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    totalPedidos++;
                    
                    if(data.estado === 'Pagado') totalGanado += parseFloat(data.total);

                    // Formatear Fecha
                    let fecha = "Desconocida";
                    if(data.fecha) {
                        const dateObj = data.fecha.toDate();
                        fecha = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString();
                    }

                    // Formatear Artículos
                    let articulosHtml = '<ul class="list-disc pl-4 space-y-1">';
                    (data.items || []).forEach(item => {
                        if(item.selection?.isMysteryBox) mysteryBoxes++;
                        
                        let extras = `<span class="text-xs text-slate-400 block mt-0.5">Talla: ${item.selection?.size || 'N/A'}`;
                        if(item.selection?.isMysteryBox && item.selection?.avoid) extras += ` | Evitar: <b class="text-red-400">${item.selection.avoid}</b>`;
                        if(item.selection?.version === 'Jugador') extras += ` | JUGADOR`;
                        if(item.selection?.customName) extras += ` | ${item.selection.customName} (${item.selection.customNumber})`;
                        extras += `</span>`;
                        
                        articulosHtml += `<li><b>${item.name}</b> ${extras}</li>`;
                    });
                    articulosHtml += '</ul>';

                    // Etiqueta de Estado
                    const badgeClass = data.estado === 'Pagado' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700';
                    const icon = data.metodoPago === 'PayPal' ? 'payments' : 'camera_alt';

                    html += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="p-4 border-r border-slate-100">
                                <div class="font-bold text-slate-700">${fecha}</div>
                                <div class="text-xs text-slate-400 font-mono mt-1">Ref: ${data.transactionId || doc.id.substring(0,8)}</div>
                            </td>
                            <td class="p-4">
                                <span class="px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 w-max ${badgeClass}">
                                    <span class="material-icons text-[14px]">${icon}</span> ${data.estado}
                                </span>
                            </td>
                            <td class="p-4">${articulosHtml}</td>
                            <td class="p-4 text-right font-black text-lg text-slate-800">${parseFloat(data.total).toFixed(2)}€</td>
                        </tr>
                    `;
                });

                if(html === '') html = '<tr><td colspan="4" class="p-8 text-center text-slate-500">Aún no hay pedidos registrados.</td></tr>';

                document.getElementById('orders-body').innerHTML = html;
                document.getElementById('stat-revenue').innerText = totalGanado.toFixed(2) + ' €';
                document.getElementById('stat-orders').innerText = totalPedidos;
                document.getElementById('stat-mystery').innerText = mysteryBoxes;

            } catch (error) {
                console.error("Error cargando pedidos:", error);
                document.getElementById('orders-body').innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500 font-bold">Error conectando con la base de datos de Firebase. Asegúrate de que las reglas de Firestore permiten escritura/lectura.</td></tr>`;
            }
        };

        // Cargar al inicio
        cargarPedidos();
    </script>
</body>
</html>

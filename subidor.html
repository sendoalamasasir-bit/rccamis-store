<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subidor Mágico | RC Camis Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/subidor.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-black text-slate-900 flex items-center gap-2">
                    <span class="material-icons text-blue-600">cloud_upload</span> Subidor Automático + Limpiador
                </h1>
                <p class="text-slate-500 mt-2">Sube imágenes, limpia los títulos y guárdalos en Firebase al instante.</p>
            </div>
            <div class="flex gap-4">
                <a href="dashboard.html" class="text-sm bg-white border border-slate-300 px-4 py-2 rounded-lg hover:bg-slate-50 font-bold">Dashboard</a>
                <a href="index.html" class="text-sm bg-white border border-slate-300 px-4 py-2 rounded-lg hover:bg-slate-50 font-bold">Tienda</a>
            </div>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">1. ¿A qué colección van estas camisetas?</label>
                    <select id="collection-select" class="w-full border border-slate-300 rounded-lg p-3 bg-slate-50 outline-none focus:border-blue-500 font-bold">
                        <option value="laliga">LaLiga 🇪🇸</option>
                        <option value="premier">Premier League 🇬🇧</option>
                        <option value="retro">Retro 🕰️</option>
                        <option value="national_teams">Selecciones 🌍</option>
                        <option value="seriea">Serie A 🇮🇹</option>
                        <option value="bundesliga">Bundesliga 🇩🇪</option>
                        <option value="ligue1">Ligue 1 🇫🇷</option>
                        <option value="long_sleeve">Manga Larga 🧥</option>
                        <option value="brasileiro">Brasil 🇧🇷</option>
                        <option value="argentina">Argentina 🇦🇷</option>
                        <option value="mls">MLS 🇺🇸</option>
                        <option value="ligamx">México 🇲🇽</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">2. Selecciona las imágenes (Yupoo)</label>
                    <input type="file" id="file-input" multiple accept="image/*" class="w-full border border-slate-300 rounded-lg p-2 bg-slate-50 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                </div>
            </div>
        </div>

        <div id="preview-container" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Vista Previa (<span id="count">0</span> camisetas)</h2>
                <button id="btn-upload" onclick="subirTodoAFirebase()" class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-700 transition-colors flex items-center gap-2 shadow-lg">
                    <span class="material-icons">cloud_upload</span> Subir a Firebase
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 border-b border-slate-200 text-sm">
                            <th class="p-4 font-bold text-slate-600 w-16">Foto</th>
                            <th class="p-4 font-bold text-slate-600 w-1/3">Archivo Original</th>
                            <th class="p-4 font-bold text-blue-600">Título Limpio Final</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100 text-sm">
                    </tbody>
                </table>
            </div>
        </div>

        <div id="progress-container" class="mt-8 bg-slate-900 rounded-xl p-6 hidden">
            <h3 class="text-white font-bold mb-4 flex items-center gap-2"><span class="material-icons animate-spin text-blue-400">sync</span> Subiendo archivos...</h3>
            <div class="w-full bg-slate-700 rounded-full h-4 mb-4">
                <div id="progress-bar" class="bg-blue-500 h-4 rounded-full transition-all"></div>
            </div>
            <div id="logs" class="space-y-2 text-xs font-mono text-blue-400 max-h-48 overflow-y-auto"></div>
        </div>
    </div>
    <script type="module" src="js/subidor.js"></script>
</body>
</html>

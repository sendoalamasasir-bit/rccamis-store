<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limpiador de Títulos | RC Camis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/limpiador.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-black text-slate-900 flex items-center gap-2">
                    <span class="material-icons text-blue-600">auto_fix_high</span> Limpiador de Nombres Pro + Kids
                </h1>
                <p class="text-slate-500 mt-2">Sistema de guardado por Lotes (Batch) activado.</p>
            </div>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
            <div class="flex items-end gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Selecciona la Colección de Firebase:</label>
                    <select id="collection-select" class="w-full border border-slate-300 rounded-lg p-3 bg-slate-50 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        <option value="laliga">LaLiga 🇪🇸</option>
                        <option value="premier">Premier League 🇬🇧</option>
                        <option value="retro">Retro 🕰️</option>
                        <option value="national_teams">Selecciones 🌍</option>
                        <option value="seriea">Serie A 🇮🇹</option>
                        <option value="bundesliga">Bundesliga 🇩🇪</option>
                        <option value="ligue1">Ligue 1 🇫🇷</option>
                        <option value="long_sleeve">Manga Larga 🧥</option>
                    </select>
                </div>
                <button onclick="cargarProductos()" class="bg-slate-900 text-white px-6 py-3 rounded-lg font-bold hover:bg-slate-800 transition-colors flex items-center gap-2">
                    <span class="material-icons">cloud_download</span> Cargar y Previsualizar
                </button>
            </div>
        </div>

        <div id="loader" class="hidden text-center py-10">
            <span class="material-icons animate-spin text-4xl text-blue-600">refresh</span>
            <p class="mt-2 font-bold text-slate-500">Procesando camisetas...</p>
        </div>

        <div id="results-container" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Vista Previa (<span id="count">0</span> productos)</h2>
                <button id="btn-update" onclick="actualizarFirebase()" class="bg-red-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-red-700 transition-colors flex items-center gap-2 shadow-lg">
                    <span class="material-icons">warning</span> Actualizar Firebase (Batch)
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 border-b border-slate-200 text-sm">
                            <th class="p-4 font-bold text-slate-600 w-1/2">Nombre Original (Feo)</th>
                            <th class="p-4 font-bold text-blue-600 w-1/2">Nuevo Nombre (Plantilla Exacta)</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100 text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
    <script type="module" src="js/limpiador.js"></script>
</body>
</html>

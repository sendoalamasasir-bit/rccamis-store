<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🏆 Procesador Total - Rccamis Store</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="css/prueba.css">
</head>
<body>

<div class="card">
    <h2>🏆 Procesador de Títulos</h2>
    <center><span class="badge">V3.0 - MULTILIGA & MANGA LARGA</span></center>

    <label>1. Selecciona la liga a procesar:</label>
    <select id="coleccion">
        <option value="laliga">🇪🇸 La Liga</option>
        <option value="premier">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</option>
        <option value="seriea">🇮🇹 Serie A</option>
        <option value="bundesliga">🇩🇪 Bundesliga</option>
        <option value="ligue1">🇫🇷 Ligue 1</option>
        <option value="eredivisie">🇳🇱 Eredivisie</option>
        <option value="primeira">🇵🇹 Primeira Liga</option>
        <option value="national_teams">🌍 Selecciones</option>
        <option value="retro">⏳ Retro Classic</option>
        <option value="kids">👶 Kids / Niños</option>
        <option value="tracksuits">🧥 Chándals</option>
        <option value="worldwire">🌐 Otros Equipos</option>
    </select>

    <button onclick="iniciarProceso()">🔄 TRADUCIR Y LIMPIAR AHORA</button>

    <div id="console">> Sistema listo. Selecciona una liga y dale a Procesar...</div>
</div>
    <script src="js/prueba.js"></script>
</body>
</html>

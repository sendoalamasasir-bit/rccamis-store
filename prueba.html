<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>⚽ Renombrador de Equipos - Rccamis</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 40px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        h2 { color: #1a1a1a; text-align: center; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; text-align: center; margin-bottom: 25px; }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; font-size: 16px; }
        button { background: #e67e22; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #d35400; }
        #console { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-top: 20px; }
        .match { color: #f1c40f; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚽ Renombrador de Equipos</h2>
    <p>Cambia "U" por "Manchester United", "MC" por "Manchester City", etc.</p>

    <label>Selecciona Colección:</label>
    <select id="coleccion">
        <option value="premier">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</option>
        <option value="laliga">🇪🇸 La Liga</option>
        <option value="seriea">🇮🇹 Serie A</option>
        <option value="national_teams">🌍 Selecciones</option>
    </select>

    <button onclick="procesarNombres()">🔄 APLICAR CAMBIOS DE NOMBRE</button>

    <div id="console">> Listo para renombrar...</div>
</div>

<script>
    // 1. CONFIGURA TUS CREDENCIALES
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "rccamis-store.firebaseapp.com",
        projectId: "rccamis-store",
        storageBucket: "rccamis-store.appspot.com",
        messagingSenderId: "TU_ID",
        appId: "TU_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const consoleDiv = document.getElementById('console');

    function log(msg) {
        consoleDiv.innerHTML += `<div>> ${msg}</div>`;
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    // --- DICCIONARIO DE TRADUCCIÓN ---
    const reemplazos = {
        " U ": " Manchester United ",
        "U ": "Manchester United ",
        " MC ": " Manchester City ",
        "Real ": "Real Madrid ",
        "Atleti ": "Atlético de Madrid ",
        "Barca": "FC Barcelona",
        "PSG": "Paris Saint-Germain"
    };

    async function procesarNombres() {
        const col = document.getElementById('coleccion').value;
        log(`Iniciando escaneo en <b>${col}</b>...`);

        try {
            const snapshot = await db.collection(col).get();
            let actualizados = 0;
            const batch = db.batch();

            snapshot.forEach(doc => {
                let nombre = doc.data().name || "";
                let nombreNuevo = nombre;

                // Aplicar cada reemplazo del diccionario
                Object.keys(reemplazos).forEach(clave => {
                    if (nombreNuevo.includes(clave)) {
                        nombreNuevo = nombreNuevo.split(clave).join(reemplazos[clave]);
                    }
                });

                // Si el nombre cambió, lo guardamos
                if (nombreNuevo !== nombre) {
                    batch.update(doc.ref, { name: nombreNuevo.trim() });
                    actualizados++;
                    log(`Cambiado: <span class="match">${nombre}</span> ➔ ${nombreNuevo}`);
                }
            });

            if (actualizados > 0) {
                await batch.commit();
                log(`<br>✅ ¡ÉXITO! Se actualizaron ${actualizados} camisetas.`);
            } else {
                log("<br>✨ No se encontraron nombres que necesiten cambio.");
            }

        } catch (error) {
            log(`❌ Error: ${error.message}`);
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🏆 Procesador Total - Rccamis Store</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --accent: #2980b9; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .badge { background: #e74c3c; color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; display: inline-block; margin-bottom: 20px; }
        select, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; font-size: 16px; border: 1px solid #ddd; }
        button { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1f6391; transform: translateY(-1px); }
        #console { background: #1e272e; color: #44bd32; padding: 15px; border-radius: 8px; height: 300px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 12px; margin-top: 15px; border: 4px solid #2f3640; }
        .change-log { color: #fbc531; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏆 Procesador de Títulos</h2>
    <center><span class="badge">V3.0 - MULTILIGA & MANGA LARGA</span></center>

    <label>1. Selecciona la liga a procesar:</label>
    <select id="coleccion">
        <option value="laliga">🇪🇸 La Liga</option>
        <option value="premier">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</option>
        <option value="seriea">🇮🇹 Serie A</option>
        <option value="bundesliga">🇩🇪 Bundesliga</option>
        <option value="ligue1">🇫🇷 Ligue 1</option>
        <option value="eredivisie">🇳🇱 Eredivisie</option>
        <option value="primeira">🇵🇹 Primeira Liga</option>
        <option value="national_teams">🌍 Selecciones</option>
        <option value="retro">⏳ Retro Classic</option>
        <option value="kids">👶 Kids / Niños</option>
        <option value="tracksuits">🧥 Chándals</option>
        <option value="worldwire">🌐 Otros Equipos</option>
    </select>

    <button onclick="iniciarProceso()">🔄 TRADUCIR Y LIMPIAR AHORA</button>

    <div id="console">> Sistema listo. Selecciona una liga y dale a Procesar...</div>
</div>

<script>
    // --- PEGA TUS CREDENCIALES AQUÍ ---
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "rccamis-store.firebaseapp.com",
        projectId: "rccamis-store",
        storageBucket: "rccamis-store.appspot.com",
        messagingSenderId: "TU_SENDER_ID",
        appId: "TU_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- DICCIONARIO MAESTRO DE TRADUCCIÓN ---
    const diccionario = {
        // Equipos
        " U ": " Manchester United ",
        "U ": "Manchester United ",
        " MC ": " Manchester City ",
        "Real ": "Real Madrid ",
        "Atleti ": "Atlético de Madrid ",
        "Barca": "FC Barcelona",
        
        // Atributos (Manga Larga / Retro)
        " LS": " Manga Larga",
        "LS ": "Manga Larga ",
        "Long Sleeve": "Manga Larga",
        "Retro": "Retro Classic",
        "Vintage": "Retro",
        
        // Limpieza General
        "Jersey": "Camiseta",
        "Shirt": "Camiseta",
        "T-shirt": "Camiseta",
        "YUPOO": "",
        "yupoo": ""
    };

    function log(msg, isChange = false) {
        const c = document.getElementById('console');
        const style = isChange ? 'class="change-log"' : '';
        c.innerHTML += `<div ${style}>> ${msg}</div>`;
        c.scrollTop = c.scrollHeight;
    }

    async function iniciarProceso() {
        const col = document.getElementById('coleccion').value;
        log(`<b>Escaneando la colección ${col.toUpperCase()}...</b>`);

        try {
            const snapshot = await db.collection(col).get();
            if (snapshot.empty) {
                log("❌ No se encontraron productos.");
                return;
            }

            let editados = 0;
            const batch = db.batch();

            snapshot.forEach(doc => {
                let nombreOriginal = doc.data().name || "";
                let nombreNuevo = nombreOriginal;

                // 1. Aplicar reemplazos del diccionario
                Object.keys(diccionario).forEach(key => {
                    const regex = new RegExp(key, "gi"); // "gi" para ignorar mayúsculas/minúsculas
                    nombreNuevo = nombreNuevo.replace(regex, diccionario[key]);
                });

                // 2. Limpieza final de espacios y capitalización
                nombreNuevo = nombreNuevo.replace(/\s+/g, ' ').trim();
                nombreNuevo = nombreNuevo.charAt(0).toUpperCase() + nombreNuevo.slice(1);

                if (nombreNuevo !== nombreOriginal) {
                    batch.update(doc.ref, { name: nombreNuevo });
                    editados++;
                    log(`Cambiado: ${nombreOriginal} ➔ <span style="color:#fff">${nombreNuevo}</span>`, true);
                }
            });

            if (editados > 0) {
                await batch.commit();
                log(`<br>✅ ¡PROCESO COMPLETADO! Se han arreglado ${editados} camisetas.`);
            } else {
                log("<br>✨ Nada que cambiar. Todo está en orden.");
            }

        } catch (err) {
            log(`❌ Error: ${err.message}`);
        }
    }
</script>

</body>
</html>
